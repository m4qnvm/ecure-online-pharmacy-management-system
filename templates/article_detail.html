{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ article.title }} - eCure Health Blog</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .article-container { max-width: 800px; margin: 20px auto 60px auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; position: relative; z-index: 10;}
        .article-header-img { width: 100%; height: 400px; object-fit: cover; background: #e8f4f3; }
        .article-content-box { padding: 50px; }
        .article-meta { color: var(--primary-teal); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px;}
        .article-title { color: #2c3e50; font-size: 40px; margin-bottom: 30px; line-height: 1.2; }
        .article-body { color: #4a5568; font-size: 18px; line-height: 1.8; }
        /* This makes line breaks in your admin panel show up properly on the website! */
        .article-body p { margin-bottom: 25px; white-space: pre-line; }
    </style>
</head>
<body style="background: var(--light-teal-bg);">
    <div class="top-background" style="height: 40vh;"></div>

    <div class="container" style="position: relative; z-index: 20;">
        <header>
            <div class="logo"><i class="fas fa-prescription-bottle-medical"></i> eCure</div>
            <nav><a href="javascript:history.back()">← BACK TO ARTICLES</a></nav>
        </header>
    </div>

    <div class="article-container">
        {% if article.image %}
            <img src="{{ article.image.url }}" class="article-header-img" alt="{{ article.title }}">
        {% else %}
            <div class="article-header-img" style="display: flex; justify-content: center; align-items: center; font-size: 80px; color: #d1e8e5;"><i class="fas fa-newspaper"></i></div>
        {% endif %}

        <div class="article-content-box">
            <div class="article-meta">Published on {{ article.published_date|date:"F d, Y" }}</div>
            <h1 class="article-title">{{ article.title }}</h1>
            <div class="article-body">
                <p>{{ article.content }}</p>
            </div>
        </div>
    </div>
</body>
</html>
